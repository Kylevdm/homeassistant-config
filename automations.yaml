- id: '1765888185532'
  alias: Home Occupation - Away
  description: Set home_occupied flag off when both people have been away for 30 min
  triggers:
  - trigger: state
    entity_id:
    - person.kyle_van_der_merwe
    - person.kelsey_hill
    to: not_home
    for:
      minutes: 30
  conditions:
  - condition: state
    entity_id: person.kyle_van_der_merwe
    state: not_home
    for:
      minutes: 30
  - condition: state
    entity_id: person.kelsey_hill
    state: not_home
    for:
      minutes: 30
  actions:
  - action: input_boolean.turn_off
    target:
      entity_id: input_boolean.home_occupied
  mode: single
- id: '1765888185533'
  alias: Home Occupation - Home
  description: Set home_occupied flag on as soon as either person arrives home
  triggers:
  - trigger: state
    entity_id:
    - person.kyle_van_der_merwe
    - person.kelsey_hill
    to: home
  conditions: []
  actions:
  - action: input_boolean.turn_on
    target:
      entity_id: input_boolean.home_occupied
  mode: single
- id: '1766271551708'
  alias: Solis on - off-peak ends (overnight)
  description: Time-based - reliably turn Solis on at end of overnight cheap window
  triggers:
  - trigger: time
    at: '05:30:00'
  conditions: []
  actions:
  - action: select.select_option
    target:
      entity_id: select.solisac_power_switch
    data:
      option: 'On'
  mode: single
- id: '1766307656531'
  alias: Solis off - off-peak starts (overnight)
  description: Time-based - reliably turn Solis off at start of overnight cheap window
  triggers:
  - trigger: time
    at: '23:30:00'
  conditions: []
  actions:
  - action: select.select_option
    target:
      entity_id: select.solisac_power_switch
    data:
      option: 'Off'
  mode: single
- id: '1766307656532'
  alias: Solis off - dispatch slot starts (daytime)
  description: Turn Solis off when Octopus Intelligent dispatch begins during the day
  triggers:
  - trigger: state
    entity_id: binary_sensor.octopus_energy_electricity_22l4386358_2200012282082_off_peak
    to: 'on'
  conditions:
  - condition: time
    after: '05:30:00'
    before: '23:30:00'
  actions:
  - action: select.select_option
    target:
      entity_id: select.solisac_power_switch
    data:
      option: 'Off'
  mode: single
- id: '1766307656533'
  alias: Solis on - dispatch slot ends (daytime)
  description: Turn Solis back on when Octopus Intelligent dispatch ends during the day
  triggers:
  - trigger: state
    entity_id: binary_sensor.octopus_energy_electricity_22l4386358_2200012282082_off_peak
    to: 'off'
  conditions:
  - condition: time
    after: '05:30:00'
    before: '23:30:00'
  actions:
  - action: select.select_option
    target:
      entity_id: select.solisac_power_switch
    data:
      option: 'On'
  mode: single
