- id: '1760173080569'
  alias: Battery Status Indicator
  description: ''
  triggers:
  - entity_id: sensor.solisac_battery_soc
    trigger: state
  conditions: []
  actions:
  - choose:
    - conditions:
      - condition: numeric_state
        entity_id: sensor.solisac_battery_soc
        above: 79.9
      sequence:
      - target:
          entity_id: light.battery_sensor
        data:
          rgb_color:
          - 0
          - 255
          - 0
          brightness_pct: 100
        action: light.turn_on
    - conditions:
      - condition: numeric_state
        entity_id: sensor.solisac_battery_soc
        above: 59.9
        below: 80
      sequence:
      - target:
          entity_id: light.battery_sensor
        data:
          rgb_color:
          - 255
          - 255
          - 0
          brightness_pct: 100
        action: light.turn_on
    - conditions:
      - condition: numeric_state
        entity_id: sensor.solisac_battery_soc
        above: 39.9
        below: 60
      sequence:
      - target:
          entity_id: light.battery_sensor
        data:
          rgb_color:
          - 255
          - 128
          - 0
          brightness_pct: 100
        action: light.turn_on
    default:
    - target:
        entity_id: light.battery_sensor
      data:
        rgb_color:
        - 255
        - 0
        - 0
        brightness_pct: 100
      action: light.turn_on
  mode: restart
