substitutions:
  name: esphome-power-hub
  battery_bank0: "${name} bank 0"
  battery_bank1: "${name} bank 1"

esphome:
  name: ${name}
  friendly_name: Power_Hub
  min_version: 2024.10.0

  on_boot:
    priority: -100
    then:
      - delay: 1s
      - logger.log: "Initialisation complete"    
      # Set Emerson R48 parameters
      - number.set:
          id: emerson_r48_output_voltage
          value: 52.5
      - number.set:
          id: emerson_r48_max_output_current
          value: 50
      - number.set:
          id: emerson_r48_max_input_current
          value: 15

external_components:
  - source: github://Kylevdm/esphome-emerson-vertiv-r48@main
    refresh: 0s
  - source: github://syssi/esphome-seplos-bms@main
    refresh: 0s

esp32:
  board: esp32dev
  framework:
    type: esp-idf

logger:
  level: DEBUG
  baud_rate: 0  # Disable serial logging (conflicts with RS485 UART)

api:
  encryption: 
    key: "jZ9SzNFA3E++F7i3avsRA65abOGIQM60R3Z5s2ivsMw="

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "Power-Hub Fallback"
    password: "qwertyzxc"

captive_portal:

esp32_ble_tracker:

bluetooth_proxy:
  active: true

# ---------------------------------------------------------------------------
# T-CAN485 board control pins
# ---------------------------------------------------------------------------

output:
  # RS485 enable (MAX13487E RE/DE) - GPIO19
  - platform: gpio
    id: rs485_enable
    pin:
      number: GPIO19
      inverted: true  # HIGH to enable

  # CAN standby/speed select (SN65HVD231 RS) - GPIO23
  - platform: gpio
    id: can_standby
    pin:
      number: GPIO23
      inverted: true  # LOW = high-speed mode, HIGH = standby

# ---------------------------------------------------------------------------
# CAN bus – ESP32 TWAI
# ---------------------------------------------------------------------------

canbus:
  - platform: esp32_can
    id: can
    tx_pin: GPIO27
    rx_pin: GPIO26
    can_id: 0x0607FF83
    use_extended_id: true
    bit_rate: 125kbps

emerson_r48:
  canbus_id: can
  update_interval: 500ms

# ---------------------------------------------------------------------------
# UART / RS485 – Seplos V3 BMS
# ---------------------------------------------------------------------------

uart:
  - id: seplos_uart
    tx_pin: GPIO22
    rx_pin: GPIO21
    baud_rate: 19200

seplos_bms:
  id: seplos_v3
  update_interval: 1s

# ---------------------------------------------------------------------------
# Binary sensors
# ---------------------------------------------------------------------------

binary_sensor:
  - platform: status
    name: "ESP Power Hub Status"

# ---------------------------------------------------------------------------
# Sensors – Emerson R48 + Seplos V3
# ---------------------------------------------------------------------------

sensor:
  # -------- Emerson Vertiv R48 via CAN --------
  - platform: emerson_r48
    output_voltage:
      name: "R48 Output Voltage"
      id: r48_output_voltage
    output_current:
      name: "R48 Output Current"
      id: r48_output_current
    output_temp:
      name: "R48 Temperature"
    input_voltage:
      name: "R48 AC Voltage"
    max_output_current:
      name: "R48 DC Max Current"
      unit_of_measurement: "%"
      icon: "mdi:percent"

  - platform: template
    name: "R48 Output Power"
    id: outpower
    unit_of_measurement: "W"
    device_class: power
    state_class: measurement
    update_interval: 2s
    accuracy_decimals: 2
    lambda: |-
      if (!isnan(id(r48_output_current).state) &&
          !isnan(id(r48_output_voltage).state) &&
          id(r48_output_current).state > 0) {
        return id(r48_output_current).state * id(r48_output_voltage).state;
      } else {
        return 0.0;
      }

  # -------- Seplos V3 BMS via RS485 --------
  - platform: seplos_bms
    total_voltage:
      name: "Seplos V3 Pack Voltage"
    current:
      name: "Seplos V3 Pack Current"
    state_of_charge:
      name: "Seplos V3 SOC"
    power:
      name: "Seplos V3 Pack Power"
    
    # Per-cell voltages
    cell_voltage_1:
      name: "Seplos V3 Cell 01 Voltage"
    cell_voltage_2:
      name: "Seplos V3 Cell 02 Voltage"
    cell_voltage_3:
      name: "Seplos V3 Cell 03 Voltage"
    cell_voltage_4:
      name: "Seplos V3 Cell 04 Voltage"
    cell_voltage_5:
      name: "Seplos V3 Cell 05 Voltage"
    cell_voltage_6:
      name: "Seplos V3 Cell 06 Voltage"
    cell_voltage_7:
      name: "Seplos V3 Cell 07 Voltage"
    cell_voltage_8:
      name: "Seplos V3 Cell 08 Voltage"
    cell_voltage_9:
      name: "Seplos V3 Cell 09 Voltage"
    cell_voltage_10:
      name: "Seplos V3 Cell 10 Voltage"
    cell_voltage_11:
      name: "Seplos V3 Cell 11 Voltage"
    cell_voltage_12:
      name: "Seplos V3 Cell 12 Voltage"
    cell_voltage_13:
      name: "Seplos V3 Cell 13 Voltage"
    cell_voltage_14:
      name: "Seplos V3 Cell 14 Voltage"
    cell_voltage_15:
      name: "Seplos V3 Cell 15 Voltage"
    cell_voltage_16:
      name: "Seplos V3 Cell 16 Voltage"

# ---------------------------------------------------------------------------
# Numbers / buttons / switches – R48 control
# ---------------------------------------------------------------------------

number:
  - platform: emerson_r48
    output_voltage:
      name: "R48 Set Output Voltage"
      id: emerson_r48_output_voltage
    max_output_current:
      name: "R48 Max Output Current"
      id: emerson_r48_max_output_current
      unit_of_measurement: "%"
    max_input_current:
      name: "R48 Max Input Current"
      id: emerson_r48_max_input_current

button:
  - platform: emerson_r48
    set_offline_values:
      name: "R48 Set Offline Values"
  - platform: restart
    name: "Restart ESP"

switch:
  - platform: emerson_r48
    ac_sw:
      name: "R48 AC Switch OFF"
      id: emerson_r48_ac_sw
      restore_mode: ALWAYS_ON
    dc_sw:
      name: "R48 DC Switch OFF"
      id: emerson_r48_dc_sw
      restore_mode: ALWAYS_ON
    fan_sw:
      name: "R48 FAN Switch MAX"
      id: emerson_r48_fan_sw
    led_sw:
      name: "R48 LED Switch"
      id: emerson_r48_led_sw
