              filter:
              - domain:
                - sun
              reorder: false
              multiple: false
        device_name_override:
          name: Device Name Override (Optional)
          description: '**USE WITH CAUTION**

            Manually specify the device name used to construct entity IDs (e.g., `sensor.DEVICENAME_temperature`).

            This overrides the automatic device name detection. Only use if you know
            the exact device name used in your ESPHome configuration.

            **Requirements:** - Must match the ESPHome device name exactly (case-sensitive
            before sanitization) - Will be sanitized: special characters replaced
            with `_`, converted to lowercase - Leave empty to use automatic detection

            **Example:** If your ESPHome device is named `NSPanel Kitchen`, enter
            `NSPanel Kitchen` here. It will be converted to `nspanel_kitchen` for
            entity IDs.

            '
          default: ''
          selector:
            text:
              multiline: false
              multiple: false
              type: text
mode: parallel
max: 50
trace:
  stored_traces: 10
trigger_variables:
  nspanel_deviceid: !input nspanel_name
  device_name_override: !input device_name_override
  nspanel_entities: '{{ device_entities(nspanel_deviceid) }}'
  device_name: "{%- if device_name_override is string and device_name_override | length
    > 0 %}\n  {{ device_name_override | regex_replace(\"[^a-zA-Z0-9]\", \"_\") | regex_replace(\"_+\",
    \"_\") | lower }}\n{%- else %}\n  {%- set display_entities = nspanel_entities
    | selectattr(None, \"search\", \"_nextion_display\") | list %}\n  {%- if display_entities
    | count > 0 %}\n    {%- set entity_first = display_entities | first %}\n    {%-
    set entity_parts = entity_first.split(\".\") %}\n    {%- set entity_parts_last
    = entity_parts | list | last %}\n    {%- set name_parts = entity_parts_last.split(\"_nextion_display\")
    %}\n    {%- set name_parts_first = name_parts | first %}\n    {{ name_parts_first
    }}\n  {%- else %}\n    {{ nspanel_deviceid | default(\"nspanel\") | string | regex_replace(\"[^a-zA-Z0-9]\",
    \"_\") | regex_replace(\"_+\", \"_\") | lower }}\n  {%- endif %}\n{%- endif %}\n"
  device_name_sensor: "{{\n  nspanel_entities | selectattr(None, \"search\", \"sensor.*_device_name\")
    | list | last\n  if nspanel_entities | selectattr(None, \"search\", \"sensor.*_device_name\")
    | list | count > 0\n  else (\"sensor.\" ~ device_name ~ \"_device_name\")\n}}\n"
  relay01_entity: "{{\n  nspanel_entities | selectattr(None, \"search\", \"switch.*_relay_1\")
    | list | last\n  if nspanel_entities | selectattr(None, \"search\", \"switch.*_relay_1\")
    | list | count > 0\n  else (\"switch.\" ~ device_name ~ \"_relay_1\")\n}}\n"
  relay02_entity: "{{\n  nspanel_entities | selectattr(None, \"search\", \"switch.*_relay_2\")
    | list | last\n  if nspanel_entities | selectattr(None, \"search\", \"switch.*_relay_2\")
    | list | count > 0\n  else (\"switch.\" ~ device_name ~ \"_relay_2\")\n}}\n"
  currentpage: "{{\n  nspanel_entities | selectattr(None, \"search\", \"sensor.*_current_page\")
    | list | last\n  if nspanel_entities | selectattr(None, \"search\", \"sensor.*_current_page\")
    | list | count > 0\n  else (\"sensor.\" ~ device_name ~ \"_current_page\")\n}}\n"
  nspaneltemp: "{{\n  nspanel_entities | selectattr(None, \"search\", \"sensor.*_temperature\")
    | list | last\n  if nspanel_entities | selectattr(None, \"search\", \"sensor.*_temperature\")
    | list | count > 0\n  else (\"sensor.\" ~ device_name ~ \"_temperature\")\n}}\n"
  thermostat_embedded: "{{\n  nspanel_entities | selectattr(None, \"search\", \"climate.*_thermostat\")
    | list | last\n  if nspanel_entities | selectattr(None, \"search\", \"climate.*_thermostat\")
    | list | count > 0\n  else (\"climate.\" ~ device_name ~ \"_thermostat\")\n}}\n"
  qrcode_enabled: !input qrcode_enabled
  utilities_line_reference:
    page01:
      main: !input utilities_page01_main_line_reference
      group01: !input utilities_page01_group01_line_reference
      group02: !input utilities_page01_group02_line_reference
      group03: !input utilities_page01_group03_line_reference
      group04: !input utilities_page01_group04_line_reference
      group05: !input utilities_page01_group05_line_reference
      group06: !input utilities_page01_group06_line_reference
  sun_entity: !input sun_entity
  sun_state_list: "{{\n  (\n    states.sun\n    | selectattr(\"entity_id\", \"in\",
    sun_entity)\n    | map(attribute=\"state\")\n    | list\n  )\n  if states.sun
    | length > 0\n  else []\n}}\n"
  sun_is_up: "{{\n  sun_state_list | first == \"above_horizon\"\n  if sun_state_list
    | length > 0\n  else true\n}}\n"
