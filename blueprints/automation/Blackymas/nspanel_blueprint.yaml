                - variables:
                    qrcode_title: !input qrcode_label
                    qrcode_entity: !input qrcode_entity
                    qrcode_fallback_value: !input qrcode_value
                    qrcode_value: "{{\n  states(qrcode_entity, rounded=True, with_unit=True)\n
                      \ if\n    qrcode_entity is defined and\n    qrcode_entity is
                      string and\n    has_value(qrcode_entity)\n  else\n    qrcode_fallback_value\n}}\n"
                - *id001
                - action: esphome.{{ nspanel_name }}_qrcode
                  data:
