            - *id001
            - action: esphome.{{ nspanel_name }}_component_text
              data:
                page: mem
                id: relay1_icon
                txt: "{{\n  all_icons[relay1_icon.split(\"mdi:\")[1]]\n  if relay1_icon.split(\"mdi:\")[1]
                  in all_icons\n  else all_icons[\"numeric-1-box-outline\"]\n}}\n"
