        icon: '{{ None }}'
        icon_color: '{{ None }}'
        name: '{{ None }}'
  - &id002
    alias: Variable Entity
    variables:
      entity_id_valid: '{{ entity_id is defined and entity_id is string and entity_id.split(".")
        | count == 2 }}'
      overlap_icon_valid: "{{\n  overlap is defined and\n  overlap.icon is defined
        and\n  overlap.icon is string and\n  overlap.icon | length > 2 and\n  overlap.icon.split(\":\")
        | count == 2 and\n  overlap.icon.split(\":\")[1] in all_icons\n}}\n"
      overlap_icon_color_valid: '{{ overlap is defined and overlap.icon_color is defined
        and overlap.icon_color is list and overlap.icon_color | count == 3 }}'
      overlap_name_valid: '{{ overlap is defined and overlap.name is defined and overlap.name
        is string and overlap.name | length > 0 }}'
      entity_state: '{{ states(entity_id) | default("unknown") if entity_id_valid
        }}'
      entity_has_value: '{{ has_value(entity_id) if entity_id_valid }}'
      entity_domain: '{{ entity_id.split(".")[0] if entity_id_valid }}'
      entity_icon: '{{ state_attr(entity_id, "icon") | default("") if entity_id_valid
        }}'
      entity_icon_valid: "{{\n  entity_icon is defined and\n  entity_icon is string
        and\n  entity_icon | length > 2 and\n  entity_icon.split(\":\") | count ==
        2 and\n  entity_icon.split(\":\")[1] in all_icons\n}}\n"
      entity_state_is_on: "{{\n  (\n    entity_state in enum.states.on or\n    (entity_domain
        in [\"input_number\", \"number\", \"sensor\"] and entity_has_value) or\n    (entity_domain
        in enum.states and entity_state in enum.states[entity_domain].on)\n  ) if
        entity_id_valid\n}}\n"
      entity_state_is_off: "{{\n  (not entity_state_is_on) and\n  (\n    entity_state
        in enum.states.off or\n    (\n      entity_domain in enum.states and\n      entity_state
        in enum.states[entity_domain].off\n    )\n  )\n  if entity_id_valid\n}}\n"
      entity_state_is_unknown: '{{ ((not entity_state_is_on) and (not entity_state_is_off))
        if entity_id_valid }}'
      entity_icon_color: "{%- if entity_id_valid -%}\n  {#- Entity ID is valid: determine
        color based on state -#}\n  {%- set default_color = overlap.icon_color if
        overlap_icon_color_valid else nextion.color.on -%}\n  {{ default_color if
        (not entity_state_is_off and not entity_state_is_unknown) else nextion.color.off
        }}\n{%- else -%}\n  {#- Entity ID invalid: use overlap color or black -#}\n
        \ {{ overlap.icon_color if overlap_icon_color_valid else [0, 0, 0] }}\n{%-
        endif -%}\n"
      entity_friendly_name: '{{ state_attr(entity_id, "friendly_name") | default("")
        if entity_id_valid }}'
      entity_friendly_name_valid: '{{ entity_friendly_name is string and entity_friendly_name
        | length > 0 }}'
      entity_device_class: '{{ state_attr(entity_id, "device_class") | default("")
        if entity_id_valid }}'
      entity:
        name: "{%- if entity_id_valid -%}\n  {#- Use overlap name if valid, otherwise
          fall back to entity name or ID -#}\n  {%- if overlap_name_valid -%}\n    {{
          overlap.name }}\n  {%- elif entity_friendly_name_valid -%}\n    {{ entity_friendly_name
          }}\n  {%- else -%}\n    {{ entity_id }}\n  {%- endif -%}\n{%- endif -%}\n"
        icon: "{%- if entity_id_valid -%}\n  {#- Set default icon based on entity
          domain -#}\n  {%- set icon_domain = nextion.icon.domain[entity_domain] |
          default(all_icons.unknown) if entity_domain else all_icons.unknown -%}\n
          \ {#- Priority 1: Use overlap icon if valid -#}\n  {%- if overlap_icon_valid
          -%}\n    {%- set icon_parts = overlap.icon.split(\":\") -%}\n    {%- if
          icon_parts | count == 2 -%}\n      {{ all_icons[icon_parts[1]] | default(icon_domain)
          }}\n    {%- else -%}\n      {{ overlap.icon }}\n    {%- endif -%}\n  {#-
          Priority 2: Domain-specific icon logic -#}\n  {%- elif entity_domain ==
          \"climate\" -%}\n    {%- set entity_hvac_action = state_attr(entity_id,
          \"hvac_action\") | default(\"\") -%}\n    {%- set entity_climate_action
          = entity_hvac_action if entity_hvac_action and entity_hvac_action not in
          enum.states.unknown else entity_state -%}\n    {%- if \"off\" in entity_climate_action
          -%}\n      {{ all_icons.thermostat }}\n    {%- elif \"heat_cool\" in entity_climate_action
          -%}\n      {{ all_icons.autorenew }}\n    {%- elif \"heating\" in entity_climate_action
          or \"heat\" in entity_climate_action -%}\n      {{ all_icons[\"thermometer-lines\"]
          }}\n    {%- elif \"cooling\" in entity_climate_action or \"cool\" in entity_climate_action
          -%}\n      {{ all_icons.snowflake }}\n    {%- elif \"drying\" in entity_climate_action
          or \"dry\" in entity_climate_action -%}\n      {{ all_icons[\"water-percent\"]
          }}\n    {%- elif \"fan\" in entity_climate_action or \"fan_only\" in entity_climate_action
          -%}\n      {{ all_icons.fan }}\n    {%- elif \"auto\" in entity_climate_action
          -%}\n      {{ all_icons[\"refresh-auto\"] }}\n    {%- elif \"idle\" in entity_climate_action
          -%}\n      {{ all_icons.thermometer }}\n    {%- else -%}\n      {{ icon_domain
          }}\n    {%- endif -%}\n  {%- elif entity_domain == \"alarm_control_panel\"
          -%}\n    {%- if entity_state in [\"disarmed\", \"disarming\"] -%}\n      {{
          all_icons[\"shield-off-outline\"] }}\n    {%- elif entity_state == \"armed_home\"
          -%}\n      {{ all_icons[\"shield-home-outline\"] }}\n    {%- elif entity_state
          == \"armed_away\" -%}\n      {{ all_icons[\"shield-lock-outline\"] }}\n
          \   {%- elif entity_state == \"armed_night\" -%}\n      {{ all_icons[\"shield-moon-outline\"]
          }}\n    {%- elif entity_state == \"armed_vacation\" -%}\n      {{ all_icons[\"shield-airplane-outline\"]
          }}\n    {%- elif entity_state == \"armed_bypass\" -%}\n      {{ all_icons[\"shield-half-full\"]
          }}\n    {%- elif entity_state in [\"pending\", \"arming\"] -%}\n      {{
          all_icons[\"shield-outline\"] }}\n    {%- else -%}\n      {{ all_icons[\"shield-alert-outline\"]
          }}\n    {%- endif -%}\n  {%- elif entity_domain == \"lock\" -%}\n    {%-
          if entity_state == \"locked\" -%}\n      {{ all_icons[\"lock\"] }}\n    {%-
          elif entity_state == \"unlocked\" -%}\n      {{ all_icons[\"lock-open-variant\"]
          }}\n    {%- else -%}\n      {{ all_icons[\"lock-alert\"] }}\n    {%- endif
          -%}\n  {#- Priority 3: Use entity's custom icon if available -#}\n  {%-
          elif entity_icon_valid -%}\n    {%- set icon_parts = entity_icon.split(\":\")
          -%}\n    {%- if icon_parts | count == 2 and icon_parts[1] in all_icons -%}\n
          \     {{ all_icons[icon_parts[1]] }}\n    {%- else -%}\n      {{ icon_domain
          }}\n    {%- endif -%}\n  {#- Priority 4: Use device class based icon -#}\n
          \ {%- elif entity_domain in [\"binary_sensor\", \"cover\", \"sensor\", \"switch\"]
          and entity_device_class is defined and entity_device_class is string and
          entity_device_class | length > 0 -%}\n    {%- set state_suffix = (\"-\"
          + entity_state) if entity_domain != \"sensor\" else \"\" -%}\n    {%- set
          device_class_key = entity_device_class + state_suffix -%}\n    {%- if device_class_key
          in device_class_icons[entity_domain] -%}\n      {%- set device_class_icon_name
          = device_class_icons[entity_domain][device_class_key] -%}\n      {{ all_icons[device_class_icon_name]
          if device_class_icon_name in all_icons else icon_domain }}\n    {%- else
          -%}\n      {{ icon_domain }}\n    {%- endif -%}\n  {#- Priority 5: Fall
          back to domain default -#}\n  {%- else -%}\n    {{ icon_domain }}\n  {%-
          endif -%}\n{%- endif -%}\n"
        icon_color: "{%- if entity_id_valid -%}\n  {#- Domain-specific color logic
          with fallback to entity_icon_color -#}\n  {%- if entity_domain == \"alarm_control_panel\"
          -%}\n    {%- if entity_state == \"disarmed\" -%}\n      {{ nextion.color.off
          }}\n    {%- elif entity_state in [\"armed_home\", \"armed_away\", \"armed_night\",
          \"armed_vacation\", \"armed_bypass\"] -%}\n      {{ nextion.color.green
          }}\n    {%- elif entity_state in [\"pending\", \"arming\", \"disarming\"]
          -%}\n      {{ nextion.color.amber }}\n    {%- elif entity_state == \"triggered\"
          -%}\n      {{ nextion.color.red }}\n    {%- else -%}\n      {{ entity_icon_color
          }}\n    {%- endif -%}\n  {%- elif entity_domain == \"climate\" -%}\n    {%-
          set entity_hvac_action = state_attr(entity_id, \"hvac_action\") | default(\"\")
          -%}\n    {%- set entity_climate_action = entity_hvac_action if entity_hvac_action
          and entity_hvac_action not in enum.states.unknown else entity_state -%}\n
          \   {%- if \"off\" in entity_climate_action -%}\n      {{ nextion.color.off
          }}\n    {%- elif \"heat_cool\" in entity_climate_action -%}\n      {{ nextion.color.amber
          }}\n    {%- elif \"heating\" in entity_climate_action or \"heat\" in entity_climate_action
          -%}\n      {{ nextion.color.deep_orange }}\n    {%- elif \"cooling\" in
          entity_climate_action or \"cool\" in entity_climate_action -%}\n      {{
          nextion.color.blue }}\n    {%- elif \"drying\" in entity_climate_action
          or \"dry\" in entity_climate_action -%}\n      {{ nextion.color.orange }}\n
          \   {%- elif \"fan\" in entity_climate_action or \"fan_only\" in entity_climate_action
          -%}\n      {{ nextion.color.cyan }}\n    {%- elif \"auto\" in entity_climate_action
          -%}\n      {{ nextion.color.green }}\n    {%- elif \"idle\" in entity_climate_action
          -%}\n      {{ nextion.color.off }}\n    {%- else -%}\n      {{ entity_icon_color
          }}\n    {%- endif -%}\n  {%- elif entity_domain == \"light\" -%}\n    {%-
          if entity_state != \"on\" -%}\n      {{ nextion.color.off }}\n    {%- else
          -%}\n      {%- set entity_rgb_color_attr = state_attr(entity_id, \"rgb_color\")
          | default(\"\") -%}\n      {%- if entity_rgb_color_attr is list and entity_rgb_color_attr
          | count == 3 -%}\n        {{ entity_rgb_color_attr }}\n      {%- else -%}\n
          \       {{ entity_icon_color }}\n      {%- endif -%}\n    {%- endif -%}\n
          \ {%- elif entity_domain == \"lock\" -%}\n    {%- if entity_state == \"locked\"
          -%}\n      {{ nextion.color.green }}\n    {%- elif entity_state == \"unlocked\"
          -%}\n      {{ nextion.color.red }}\n    {%- else -%}\n      {{ entity_icon_color
          }}\n    {%- endif -%}\n  {#- Default: use entity_icon_color for all other
          domains -#}\n  {%- else -%}\n    {{ entity_icon_color }}\n  {%- endif -%}\n{%-
          endif -%}\n"
- alias: Main choices
  choose:
  - alias: Date
    conditions:
    - condition: trigger
      id: time_state
    sequence:
    - &id004
      delay:
        milliseconds: !input delay
    - &id003
      action: esphome.{{ nspanel_name }}_component_text
      data:
        page: home
        id: date
        txt: "{{\n  as_timestamp(now())\n  | timestamp_custom\n  (\n    date_format\n
          \   | replace(\"%A\", (dict.values(mui[language].weekdays) | list)[now().weekday()])\n
          \   | replace(\"%a\", (dict.values(mui[language].weekdays_short) | list)[now().weekday()])\n
          \   | replace(\"%B\", (dict.values(mui[language].months) | list)[now().month-1])\n
          \   | replace(\"%b\", (dict.values(mui[language].months_short) | list)[now().month-1])\n
          \ )\n}}\n"
      continue_on_error: true
  - alias: NSPanel event
    conditions:
    - condition: trigger
      id: nspanel_event
    sequence:
    - variables:
        nspanel_event: '{{ trigger.event.data }}'
    - choose:
      - alias: Boot init
        conditions:
        - '{{ nspanel_event.type == "boot"}}'
        - '{{ nspanel_event.step is defined and nspanel_event.step in ["start", "timeout"]}}'
        sequence:
        - &id013
          sequence:
          - alias: Blueprint version
            sequence:
            - &id001
              delay:
                milliseconds: !input delay_boot
            - action: esphome.{{ nspanel_name }}_component_text
              data:
                page: mem
                id: ver_blueprint
                txt: '{{ blueprint_version }}'
              continue_on_error: true
          - &id007
            variables:
              hw_button_left_entity: !input left_button_entity
              hw_button_left_state_entity: !input left_button_state_entity
              hw_button_right_entity: !input right_button_entity
              hw_button_right_state_entity: !input right_button_state_entity
              hardware:
                buttons:
                  left:
                    entity: '{{ hw_button_left_entity }}'
                    entity_is_valid: '{{ hw_button_left_entity is defined and hw_button_left_entity
                      is string and hw_button_left_entity.split(".") | count == 2
                      }}'
                    state_entity: '{{ hw_button_left_state_entity }}'
                    state_entity_is_valid: '{{ hw_button_left_state_entity is defined
                      and hw_button_left_state_entity is string and hw_button_left_state_entity.split(".")
                      | count == 2 }}

                      '
                    name: !input left_button_name
                    hold_select: !input left_button_hold_select
                    bar_always_visible: !input hw_button_bar_left_always_show
                  right:
                    entity: '{{ hw_button_right_entity }}'
                    entity_is_valid: '{{ hw_button_right_entity is defined and hw_button_right_entity
                      is string and hw_button_right_entity.split(".") | count == 2
                      }}'
                    state_entity: '{{ hw_button_right_state_entity }}'
                    state_entity_is_valid: '{{ hw_button_right_state_entity is defined
                      and hw_button_right_state_entity is string and hw_button_right_state_entity.split(".")
                      | count == 2 }}

                      '
                    name: !input right_button_name
                    hold_select: !input right_button_hold_select
                    bar_always_visible: !input hw_button_bar_right_always_show
          - variables:
              home_indoor_temp_icon: !input home_indoor_temp_icon
          - alias: DateTime
            sequence:
            - alias: Timezone
              sequence:
              - variables:
                  timezone: !input timezone
                  timezone_code: "{{\n  timezone.split('(')[1] | replace(')', '')\n
                    \ if\n    timezone is string and\n    timezone | length > 1 and\n
                    \   timezone.split('(') | count > 1\n  else timezone\n}}\n"
              - *id001
              - action: esphome.{{ nspanel_name }}_component_text
                data:
                  page: mem
                  id: timezone
                  txt: '{{ timezone_code if timezone_code is string else "" }}'
                continue_on_error: true
            - alias: DateTime on page home
              sequence:
              - *id001
              - alias: date_color
                action: esphome.{{ nspanel_name }}_component_color
                data:
                  page: mem
                  id: date_color
                  color: !input date_label_color
                continue_on_error: true
              - *id001
              - alias: time_color
                action: esphome.{{ nspanel_name }}_component_color
                data:
                  page: mem
                  id: time_color
                  color: !input time_label_color
                continue_on_error: true
              - *id001
              - alias: time_format
                action: esphome.{{ nspanel_name }}_component_text
                data:
                  page: mem
                  id: time_format
                  txt: !input time_format
                continue_on_error: true
              - *id001
              - alias: meridiem_am
                action: esphome.{{ nspanel_name }}_component_text
                data:
                  page: mem
                  id: meridiem_am
                  txt: '{{ dict.values(mui[language].meridiem) | list | first }}'
                continue_on_error: true
              - *id001
              - alias: meridiem_pm
                action: esphome.{{ nspanel_name }}_component_text
                data:
                  page: mem
                  id: meridiem_pm
                  txt: '{{ dict.values(mui[language].meridiem) | list | last }}'
                continue_on_error: true
          - alias: Home page
            sequence:
            - *id001
            - alias: chip_font
              action: esphome.{{ nspanel_name }}_component_val
              data:
                page: mem
                id: chip_font
                val: !input chip_font_size
              continue_on_error: true
            - *id001
            - alias: custom_buttons_font
              action: esphome.{{ nspanel_name }}_component_val
              data:
                page: mem
                id: custom_buttons_font
                val: !input custom_buttons_font_size
              continue_on_error: true
            - *id001
            - alias: outdoor_temp_font
              action: esphome.{{ nspanel_name }}_component_val
              data:
                page: mem
                id: outdoor_temp_font
                val: !input home_outdoor_temp_font
              continue_on_error: true
            - alias: Home page - Entities button
              sequence:
              - variables:
                  bt_entities_icon: !input home_button06_icon
              - *id001
              - alias: entities_pages_icon
                action: esphome.{{ nspanel_name }}_component_text
                data:
                  page: mem
                  id: entities_pages_icon
                  txt: "{{\n  all_icons[bt_entities_icon.split(\"mdi:\")[1]]\n  if
                    bt_entities_icon is string and bt_entities_icon.split(\"mdi:\")[1]
                    in all_icons\n  else all_icons[\"format-list-bulleted-square\"]\n}}\n"
                continue_on_error: true
              - *id001
              - alias: entities_pages_icon_color
                action: esphome.{{ nspanel_name }}_component_color
                data:
                  page: mem
                  id: entities_pages_icon_color
                  color: !input home_button06_icon_color
                continue_on_error: true
            - alias: Home page - Utilities button
              sequence:
              - variables:
                  utilities_enabled: !input utilities_enabled
                  bt_utilities_icon: !input home_button08_icon
              - *id001
              - alias: utilities_enabled
                action: esphome.{{ nspanel_name }}_component_val
                data:
                  page: mem
                  id: utilities_enabled
                  val: '{{ 1 if utilities_enabled else 0 }}'
                continue_on_error: true
              - condition: '{{ utilities_enabled }}'
              - *id001
              - alias: utilities_icon
                action: esphome.{{ nspanel_name }}_component_text
                data:
                  page: mem
                  id: utilities_icon
                  txt: "{{\n  all_icons[bt_utilities_icon.split(\"mdi:\")[1]]\n  if
                    bt_utilities_icon is string and bt_utilities_icon.split(\"mdi:\")[1]
                    in all_icons\n  else all_icons.gauge\n}}\n"
                continue_on_error: true
              - *id001
              - alias: utilities_icon_color
                action: esphome.{{ nspanel_name }}_component_color
                data:
                  page: mem
                  id: utilities_icon_color
                  color: !input home_button08_icon_color
                continue_on_error: true
          - sequence:
            - variables:
                home_button04_icon_color01: !input home_button04_icon_color01
                bt_notific_icon_color: "{{\n  home_button04_icon_color01\n  if home_button04_icon_color01
                  is list and home_button04_icon_color01 | count == 3\n  else [200,
                  204, 200]\n}}\n"
            - *id001
            - action: esphome.{{ nspanel_name }}_component_color
              data:
                page: mem
                id: notification_icon_color_normal
                color: '{{ bt_notific_icon_color }}'
              continue_on_error: true
            - *id001
            - action: esphome.{{ nspanel_name }}_component_color
              data:
                page: mem
                id: notification_icon_color_unread
                color: !input home_button04_icon_color02
              continue_on_error: true
            - *id001
            - variables:
                bt_notific_icon: !input home_button04_icon
            - action: esphome.{{ nspanel_name }}_icon
              data:
                page: home
                id: bt_notific
                icon: "{{\n  all_icons[bt_notific_icon.split(\":\")[1]]\n  if bt_notific_icon
                  is string and bt_notific_icon.split(\":\")[1] in all_icons\n  else
                  all_icons.email\n}}\n"
                icon_color: '{{ bt_notific_icon_color }}'
                visible: false
              continue_on_error: true
          - alias: Home page - outdoor_temp
            sequence:
            - *id001
            - action: esphome.{{ nspanel_name }}_component_color
              data:
                page: home
                id: outdoor_temp
                color: !input home_outdoor_temp_label_color
              continue_on_error: true
          - alias: Home page - indr_temp
            sequence:
            - *id001
            - action: esphome.{{ nspanel_name }}_component_color
              data:
                page: home
                id: indr_temp
                color: !input home_indoor_temp_label_color
              continue_on_error: true
            - *id001
            - action: esphome.{{ nspanel_name }}_component_text
              data:
                page: home
                id: indr_temp_icon
                txt: "{{\n  all_icons[home_indoor_temp_icon.split(\"mdi:\")[1]]\n
                  \ if home_indoor_temp_icon.split(\"mdi:\") | count == 2 and home_indoor_temp_icon.split(\"mdi:\")[1]
                  in all_icons\n  else all_icons.thermometer\n}}\n"
              continue_on_error: true
            - *id001
            - action: esphome.{{ nspanel_name }}_component_color
              data:
                page: home
                id: indr_temp_icon
                color: !input home_indoor_temp_icon_color
              continue_on_error: true
          - alias: Status / Chips bar
            repeat:
              for_each: "{{\n  home_page.chips\n  | selectattr(\"entity\", \"defined\")\n
                \ | rejectattr(\"entity\", \"eq\", [])\n  | selectattr(\"icon_color_rgb\",
                \"defined\")\n  | rejectattr(\"icon_color_rgb\", \"eq\", [])\n  |
                rejectattr(\"icon_color_rgb\", \"eq\", [0, 0, 0])\n  | list\n}}\n"
              sequence:
              - *id001
              - action: esphome.{{ nspanel_name }}_component_color
                data:
                  page: home
                  id: '{{ repeat.item.component }}'
                  color: '{{ repeat.item.icon_color_rgb }}'
                continue_on_error: true
          - alias: Home page - Values 01 - 04
            repeat:
              for_each: '{{ home_page.entity_value | list }}'
              sequence:
              - variables:
                  entity_id: '{{ repeat.item.entity }}'
                  overlap:
                    icon: '{{ repeat.item.icon }}'
                    icon_color: "{{\n  repeat.item.icon_color_rgb\n  if repeat.item.icon_color_rgb
                      is defined and\n      repeat.item.icon_color_rgb is list and\n
                      \     repeat.item.icon_color_rgb | count == 3\n  else [200,
                      204, 200]\n}}\n"
              - *id002
              - *id001
              - action: esphome.{{ nspanel_name }}_component_color
                data:
                  page: home
                  id: '{{ repeat.item.component }}'
                  color: "{{\n  entity.icon_color\n  if entity.icon_color is defined
                    and\n      entity.icon_color is list and\n      entity.icon_color
                    | count == 3\n  else overlap.icon_color\n}}\n"
                continue_on_error: true
              - *id001
              - action: esphome.{{ nspanel_name }}_component_text
                data:
                  page: '{{ repeat.item.page }}'
                  id: '{{ repeat.item.component }}_icon'
                  txt: "{{\n  entity.icon\n  if entity.icon is defined and entity.icon
                    is string and entity.icon | length > 0\n  else all_icons.blank\n}}\n"
                continue_on_error: true
          - alias: NSPanel Left Button Name
            if: '{{ hardware.buttons.left.name | length > 0 }}'
            then:
            - *id001
            - action: esphome.{{ nspanel_name }}_component_color
              data:
                page: home
                id: left_bt_text
                color: !input left_button_color
              continue_on_error: true
            - *id001
            - action: esphome.{{ nspanel_name }}_component_text
              data:
                page: home
                id: left_bt_text
                txt: '{{ hardware.buttons.left.name }}'
              continue_on_error: true
          - alias: NSPanel Right Button Name
            if: '{{ hardware.buttons.right.name | length > 0 }}'
            then:
