                    txt: "{{\n  all_icons[bt_qrcode_icon.split(\"mdi:\")[1]]\n  if
                      bt_qrcode_icon is string and bt_qrcode_icon.split(\"mdi:\")[1]
                      in all_icons\n  else all_icons[\"qrcode-scan\"]\n}}\n"
                  continue_on_error: true
              - *id001
              - alias: qrcode_icon_color
                action: esphome.{{ nspanel_name }}_component_color
