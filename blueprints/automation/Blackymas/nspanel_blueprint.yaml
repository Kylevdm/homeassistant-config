        tft_path:
          name: Nextion TFT File Folder (Optional)
          description: 'Specify the path to the folder containing the Nextion TFT
            file. Note that configuring the [Folder Watcher](https://www.home-assistant.io/integrations/folder_watcher/)
            in `configuration.yaml` is required for this path to be monitored.

            With this, the Blueprint will trigger a TFT upload every time a file on
            that folder changed.

            **Note:**

            - This is to be used together with the option `nextion_upload_tft` on
            the "Update TFT Display - Model" option on the device''s page.

            - This is a relative path on Home Assistant file system pointing to the
            www folder where you store your `nspanel_xxx.tft` files. Please do not
            use the url here.

            '
          default: ''
          selector:
            text:
              multiline: false
              multiple: false
        domain_automation_button_action:
          name: System settings - Button action for automation entities
          description: 'Select the button action when associated to `automation.xxx`
            entities.

            ***Toggle:** Enable/disable the automation (default).*

            ***Trigger:** Run the automation (ignoring conditions).*

            '
          default: toggle
          selector:
            select:
              multiple: false
              options:
              - label: Toggle (default)
                value: toggle
              - label: Trigger
                value: trigger
              sort: false
              custom_value: false
        sun_entity:
          name: System Settings - Sun Entity
          description: Select the entity that indicates the Sun's position.
          default: []
          selector:
