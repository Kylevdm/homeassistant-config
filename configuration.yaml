#device_options:
#  legacy: false


# Text to speech
tts:
  - platform: google_translate

automation: !include automations.yaml
script: !include scripts.yaml
scene: !include scenes.yaml

input_boolean:
  home_occupied:
    name: Home Occupied
    icon: mdi:home-account

my:



sensor:
  - platform: average
    name: 'Average Upstairs Temperature'
    entities:
      - sensor.0xa4c138fb6e5add12_temperature
      - sensor.th_01_temperature
      - sensor.0xa4c138f24e1cef1e_temperature

template:
  - sensor:
      # Current grid import (positive) or export (negative) in Watts
      - name: "Total Grid Load"
        unique_id: total_grid_load
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        state: >
          {{ states('sensor.myenergi_bath_zappi_master_power_grid') | float(0) }}
      
      # Determine charging phase based on SOC
      - name: "Battery Charge Phase"
        unique_id: battery_charge_phase
        state: >
          {% set b_voltage = states('sensor.sp112b2410100228_voltage') | float(0) %}
          {% if b_voltage < 54.4 %}
            bulk
          {% elif b_voltage < 56.8 %}
            absorption
          {% elif b_voltage < 58.4 %}
            top_balance
          {% else %}
            complete
          {% endif %}
        icon: >
          {% set b_voltage = states('sensor.sp112b2410100228_voltage') | float(0) %}
          {% if b_voltage < 54.4 %}
            mdi:battery-charging-50
          {% elif b_voltage < 56.8 %}
            mdi:battery-charging-80
          {% elif b_voltage < 58.4 %}
            mdi:battery-charging-100
          {% else %}
            mdi:battery
          {% endif %}
  - binary_sensor:
      - name: "V2L Car Connected"
        device_class: connectivity
        state: >
          {{ 
            states('switch.v2l') in ['on', 'true', '1'] and 
            states('switch.v2l') != 'unavailable'
          }}
        availability: >
          {{ states('switch.v2l') not in ['unknown', 'unavailable'] }}
      - name: "Home Occupied"
        device_class: occupancy
        state: >
          {{ 
            states('person.your_name') == 'home' or
            states('device_tracker.phone1') == 'home' or
            states('binary_sensor.living_room_motion') == 'on' or
            is_state('binary_sensor.bedroom_occupancy', 'on')
          }}
        delay_off:
          minutes: 15
        availability: >
          {{ 
            states('person.your_name') not in ['unknown', 'unavailable'] or
            states('device_tracker.phone1') not in ['unknown', 'unavailable']
          }}

