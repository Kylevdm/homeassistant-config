# Text to speech
tts:
  - platform: google_translate

automation: !include automations.yaml
script: !include scripts.yaml
scene: !include scenes.yaml

input_boolean:
  home_occupied:
    name: Home Occupied
    icon: mdi:home-account

my:



sensor:
  - platform: average
    name: 'Average Upstairs Temperature'
    entities:
      - sensor.0xa4c138fb6e5add12_temperature
      - sensor.th_01_temperature
      - sensor.0xa4c138f24e1cef1e_temperature

template:
  - sensor:
      # Current grid import (positive) or export (negative) in Watts
      - name: "Total Grid Load"
        unique_id: total_grid_load
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        state: >
          {{ states('sensor.myenergi_bath_zappi_master_power_grid') | float(0) }}
      
      # Determine charging phase based on SOC
      - name: "Battery Charge Phase"
        unique_id: battery_charge_phase
        state: >
          {% set b_voltage = states('sensor.sp18b2311040070_voltage') | float(0) %}
          {% if b_voltage < 54.4 %}
            bulk
          {% elif b_voltage < 56.8 %}
            absorption
          {% elif b_voltage < 58.4 %}
            top_balance
          {% else %}
            complete
          {% endif %}
        icon: >
          {% set b_voltage = states('sensor.sp18b2311040070_voltage') | float(0) %}
          {% if b_voltage < 54.4 %}
            mdi:battery-charging-50
          {% elif b_voltage < 56.8 %}
            mdi:battery-charging-80
          {% elif b_voltage < 58.4 %}
            mdi:battery-charging-100
          {% else %}
            mdi:battery
          {% endif %}
          
      # Seplos cell voltages (0–15)
      - name: "Seplos Cell 0 Voltage"
        unique_id: seplos_cell_0_voltage
        unit_of_measurement: "V"
        device_class: voltage
        state_class: measurement
        state: >
          {{ (state_attr('sensor.sp18b2311040070_delta_cell_voltage', 'cell_voltages') | default([], true))[0] | default(none) }}
        availability: >
          {{ has_value('sensor.sp18b2311040070_delta_cell_voltage')
             and state_attr('sensor.sp18b2311040070_delta_cell_voltage', 'cell_voltages') is not none }}

